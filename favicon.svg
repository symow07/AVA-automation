<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#1a2d4a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- A lettermark -->
  <text x="32" y="45" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
        text-anchor="middle" fill="url(#glow)">A</text>
  <!-- Cyan underline accent -->
  <rect x="18" y="50" width="28" height="3" rx="1.5" fill="#00D4FF" opacity="0.7"/>
</svg>
